# This is a manual-only teaching example.
# It shows how the same CI/CD story can extend to Azure Container Registry and AKS.
# It is visible in the Actions tab, but it is not part of the core beginner labs.
# Do not run it unless the required Azure and registry secrets are configured.
name: 91 OPTIONAL Example - Azure ACR and AKS (Do Not Run Unless Instructed)

on:
  # Keep this example visible without triggering it automatically during class.
  workflow_dispatch:

env:
  # These are example placeholders only.
  ACR_LOGIN_SERVER: example.azurecr.io
  IMAGE_NAME: tiny-health-app
  AKS_NAMESPACE: demo
  AKS_DEPLOYMENT: tiny-health-app
  AKS_CONTAINER: tiny-health-app

jobs:
  verify:
    # CI still starts by checking whether the change is safe.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

  build-and-push-image:
    # After CI passes, package the app and push the image to ACR.
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set image tag
        # Use today's UTC date plus the GitHub run ID.
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        # buildx is a common way to build and push images in one step.
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        # In a real project, these values would come from GitHub secrets.
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image with Docker Buildx
        # In this cloud-shaped version, the packaged output is pushed to ACR.
        # Two tags are pushed:
        # - one traceable run tag
        # - one latest tag for easy reference
        run: |
          docker buildx build \
            --push \
            --tag "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" \
            --tag "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:latest" \
            .

  deploy-to-aks:
    # Delivery uses the same image that was already pushed to ACR.
    needs: build-and-push-image
    runs-on: ubuntu-latest

    steps:
      - name: Azure login
        # Real projects use secrets for cloud credentials.
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        # Connect the runner to the target AKS cluster.
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy image to AKS
        # Update the cluster to run the exact image that was built and pushed earlier.
        run: |
          kubectl set image "deployment/${AKS_DEPLOYMENT}" \
            "${AKS_CONTAINER}=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${{ needs.build-and-push-image.outputs.image_tag }}" \
            -n "${AKS_NAMESPACE}"
          kubectl rollout status "deployment/${AKS_DEPLOYMENT}" -n "${AKS_NAMESPACE}" --timeout=5m
