name: ASSESMENT PT.2-Build and Package Pipeline after merge

on:
  workflow_dispatch:

  push:
    branches:
      - main

env:
  IMAGE_NAME: tiny-health-app

jobs:
  build-and-push-ecr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        # Build only after verification passes
        run: python -m unittest discover -s tests -v

      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          # Build with multiple tags for flexibility
          docker build \
            -t ${{ secrets.ECR_REPOSITORY_URI }}:${{ steps.image-tag.outputs.image_tag }} \
            -t ${{ secrets.ECR_REPOSITORY_URI }}:latest \
            -t ${{ secrets.ECR_REPOSITORY_URI }}:${{ steps.image-tag.outputs.short_sha }} \
            .

      - name: Push image to Amazon ECR
        run: |
          docker push ${{ secrets.ECR_REPOSITORY_URI }} --all-tags

      - name: Output image information
        run: |
          echo " Image pushed to ECR successfully!"
          echo "Repository: ${{ secrets.ECR_REPOSITORY_URI }}"
          echo "Tags: ${{ steps.image-tag.outputs.image_tag }}, latest, ${{ steps.image-tag.outputs.short_sha }}"