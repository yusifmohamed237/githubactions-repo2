# This workflow completes the story by delivering the saved package.
# It starts after the build workflow finishes successfully.
name: 04 Deploy Workflow

on:
  workflow_run:
    # Listen for the build workflow by name.
    workflows: ["03 Build Artifact Workflow"]
    # Start when the build workflow has completed.
    types: [completed]

permissions:
  # Read access is enough because this workflow only downloads artifacts and reads repo data.
  actions: read
  contents: read

jobs:
  deploy-package:
    # Continue only when the build workflow succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    # Use a fresh runner for the deployment simulation.
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        # Download the exact artifact produced by the build run.
        uses: actions/download-artifact@v4
        with:
          name: tiny-health-app-image
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: downloaded-artifact

      - name: Show downloaded files
        # Quick visibility step so students can see what arrived from the build.
        run: ls -R downloaded-artifact

      - name: Load Docker image
        # Turn the saved artifact file back into a Docker image.
        run: docker load --input downloaded-artifact/tiny-health-app.tar

      - name: Recreate image tag from build run
        # Rebuild the same date-plus-run-id tag the build workflow created.
        id: image-tag
        run: |
          BUILD_DATE="$(echo "${{ github.event.workflow_run.created_at }}" | cut -dT -f1)"
          IMAGE_TAG="${BUILD_DATE}-${{ github.event.workflow_run.id }}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Start container
        # Start the exact same tagged image that the build workflow created.
        run: |
          docker run -d \
            --name tiny-health-container \
            -p 8000:8000 \
            "tiny-health-app:${{ steps.image-tag.outputs.image_tag }}"

      - name: Show running containers
        # New visibility step - shows what containers are running
        run: docker ps

      - name: Show health response
        # New visibility step - prints the /health endpoint response
        run: |
          echo "Waiting for app to become ready..."
          sleep 3
          echo "Health endpoint response:"
          curl --fail --silent http://127.0.0.1:8000/health || echo "App not ready yet"

      - name: Smoke test deployed app
        # Retry a few times because app startup can take a moment.
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Stop container
        if: always()
        # Clean up even if an earlier step fails.
        run: docker rm -f tiny-health-container || true