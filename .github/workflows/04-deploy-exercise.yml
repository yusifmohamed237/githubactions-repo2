name: 04 Deploy Workflow-ex

on:
  workflow_run:
    workflows: ["03 Build Artifact Workflow"]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  deploy-from-ecr:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Get build information
        id: build-info
        run: |
          # Extract the image tag from the triggering build run
          BUILD_RUN_ID="${{ github.event.workflow_run.id }}"
          BUILD_DATE="$(echo "${{ github.event.workflow_run.created_at }}" | cut -dT -f1)"
          IMAGE_TAG="${BUILD_DATE}-${BUILD_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull image from ECR
        run: |
          docker pull ${{ secrets.ECR_REPOSITORY_URI }}:${{ steps.build-info.outputs.image_tag }}

      - name: Start container
        run: |
          docker run -d \
            --name tiny-health-container \
            -p 8000:8000 \
            ${{ secrets.ECR_REPOSITORY_URI }}:${{ steps.build-info.outputs.image_tag }}

      - name: Show running containers
        run: docker ps

      - name: Show health response
        run: |
          echo "Waiting for app to become ready..."
          sleep 3
          echo "Health endpoint response:"
          curl --fail --silent http://127.0.0.1:8000/health || echo "App not ready yet"

      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f tiny-health-container || true