  <rect x="760" y="170" width="330" height="58" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="786" y="206" fill="#57606a" font-family="Arial, Helvetica, sans-serif" font-size="22">90 OPTIONAL Full Containerized</text>
